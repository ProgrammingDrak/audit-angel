services:
  - type: web
    name: audit-angel
    runtime: node
    plan: free
    region: ohio
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.0
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DEFAULT_USER_EMAIL
        sync: false
      - key: DEFAULT_USER_PASSWORD
        sync: false

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clever Real Estate -- Deal Stages</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 100%; height: 100vh; overflow: hidden; }
iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>
<iframe id="qbrFrame" src="../clever-qbr-dashboard.html#deal-stages"></iframe>
<script>
// Relay data from the shell (parent) to the inner QBR iframe
// This file sits between: Shell (grandparent) -> this wrapper -> QBR monolith (child)

var qbrFrame = document.getElementById('qbrFrame');

// Listen for data from the Command Center shell (our parent)
window.addEventListener('message', function(event) {
    if (!event.data) return;
    // Forward all phcc messages to the inner QBR
    if (event.data.type && event.data.type.indexOf('phcc-') === 0) {
        try { qbrFrame.contentWindow.postMessage(event.data, '*'); } catch(e) {}
    }
});

// Listen for messages from the inner QBR and relay to the shell
qbrFrame.addEventListener('load', function() {
    // Tell the QBR to switch to deal-stages tab
    try {
        qbrFrame.contentWindow.postMessage({ type: 'phcc-switch-tab', tab: 'deal-stages' }, '*');
    } catch(e) {}
});

// Forward QBR messages back up to the shell
window.addEventListener('message', function(event) {
    if (!event.data) return;
    if (event.data.type === 'phcc-request-data' || event.data.type === 'phcc-pin' || event.data.type === 'phcc-ready') {
        try { window.parent.postMessage(event.data, '*'); } catch(e) {}
    }
});

// If embedded in shell, send phcc-ready to request data
if (window.self !== window.top) {
    window.parent.postMessage({ type: 'phcc-ready', dataContract: ['deals', 'connections'] }, '*');
}
</script>
</body>
</html>

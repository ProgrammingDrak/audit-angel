<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clever Offers: Team Time Allocation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
    --primary-blue: #1a73e8;
    --accent-orange: #f4811f;
    --bg: #f5f7fa;
    --card-bg: #ffffff;
    --text: #1e293b;
    --text-light: #64748b;
    --border: #e2e8f0;
    --green: #16a34a;
    --red: #dc2626;
    --yellow: #eab308;
    --purple: #7c3aed;
    --teal: #0d9488;
    --pink: #ec4899;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
}

.header {
    background: linear-gradient(135deg, var(--primary-blue) 0%, #1e40af 100%);
    color: white;
    padding: 2.5rem 2rem 2rem;
    text-align: center;
}
.header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.4rem; }
.header .subtitle { font-size: 1rem; opacity: 0.9; margin-bottom: 0.3rem; }
.header .meta { font-size: 0.8rem; opacity: 0.75; }

.container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }

/* View toggle */
.view-toggle {
    display: flex;
    gap: 0;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    width: fit-content;
    margin-bottom: 1.5rem;
}
.view-btn {
    padding: 0.6rem 1.2rem;
    border: none;
    background: white;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-light);
    transition: all 0.2s;
}
.view-btn.active {
    background: var(--primary-blue);
    color: white;
}
.view-btn:hover:not(.active) { background: var(--bg); }

/* Summary bar */
.summary-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
}
.summary-card {
    background: white;
    border-radius: 8px;
    padding: 1rem 1.2rem;
    border: 1px solid var(--border);
}
.summary-card .label { font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.summary-card .value { font-size: 1.6rem; font-weight: 700; color: var(--text); }
.summary-card .sub { font-size: 0.78rem; color: var(--text-light); }

/* Donut grid */
.donut-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
}

.person-card {
    background: white;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    overflow: hidden;
}

.person-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 1.2rem;
    border-bottom: 1px solid var(--border);
}

.avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 0.8rem;
    flex-shrink: 0;
}
.avatar.orange { background: var(--accent-orange); }
.avatar.green { background: var(--green); }
.avatar.purple { background: var(--purple); }
.avatar.teal { background: var(--teal); }

.person-info h3 { font-size: 0.95rem; font-weight: 600; }
.person-info .title { font-size: 0.78rem; color: var(--text-light); }
.person-hours {
    margin-left: auto;
    text-align: right;
}
.person-hours .total { font-size: 1.3rem; font-weight: 700; color: var(--primary-blue); }
.person-hours .label { font-size: 0.7rem; color: var(--text-light); }

.person-body {
    display: flex;
    align-items: flex-start;
    padding: 1rem 1.2rem;
    gap: 1rem;
}

.chart-wrapper {
    width: 180px;
    height: 180px;
    flex-shrink: 0;
    position: relative;
}

.task-list {
    flex: 1;
    min-width: 0;
}

.task-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.3rem 0;
    font-size: 0.8rem;
    border-bottom: 1px solid #f1f5f9;
}
.task-row:last-child { border-bottom: none; }

.task-color {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
}
.task-name {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.task-hours {
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
}
.task-pct {
    font-size: 0.72rem;
    color: var(--text-light);
    width: 35px;
    text-align: right;
}

/* Edit panel */
.person-footer {
    padding: 0.75rem 1.2rem;
    border-top: 1px solid var(--border);
    background: #fafbfc;
}

.add-task-row {
    display: flex;
    gap: 0.4rem;
    align-items: center;
}

.add-task-row input[type="text"] {
    flex: 1;
    padding: 0.4rem 0.6rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.8rem;
    outline: none;
}
.add-task-row input[type="text"]:focus { border-color: var(--primary-blue); }

.add-task-row input[type="number"] {
    width: 60px;
    padding: 0.4rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.8rem;
    text-align: center;
    outline: none;
}
.add-task-row input[type="number"]:focus { border-color: var(--primary-blue); }

.add-btn, .remove-btn {
    padding: 0.4rem 0.7rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 600;
    transition: all 0.2s;
}
.add-btn {
    background: var(--primary-blue);
    color: white;
}
.add-btn:hover { background: #1557b0; }

.remove-btn {
    background: transparent;
    color: var(--red);
    font-size: 0.85rem;
    padding: 0.2rem 0.4rem;
    opacity: 0;
    transition: opacity 0.2s;
}
.task-row:hover .remove-btn { opacity: 1; }

/* Stacked bar view */
.stacked-section { margin-bottom: 2rem; }
.stacked-chart-wrapper {
    background: white;
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 1.5rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.stacked-chart-container { height: 300px; position: relative; }

/* Data table */
.data-table-wrapper {
    background: white;
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 1.5rem;
    margin-top: 1.5rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    overflow-x: auto;
}
.data-table-wrapper h3 {
    font-size: 1rem;
    margin-bottom: 1rem;
}
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
}
th, td {
    padding: 0.6rem 0.8rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
}
th {
    background: var(--bg);
    font-weight: 600;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--text-light);
}
td { color: var(--text); }
tr:hover td { background: #f8fafc; }

.editable-hours {
    width: 50px;
    padding: 0.25rem 0.4rem;
    border: 1px solid transparent;
    border-radius: 4px;
    text-align: center;
    font-size: 0.82rem;
    background: transparent;
    cursor: pointer;
    font-weight: 600;
}
.editable-hours:hover { border-color: var(--border); background: white; }
.editable-hours:focus { border-color: var(--primary-blue); background: white; outline: none; }

.capacity-bar {
    height: 6px;
    background: #e2e8f0;
    border-radius: 3px;
    overflow: hidden;
    width: 80px;
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
}
.capacity-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1e293b;
    color: white;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.85rem;
    z-index: 1000;
    transition: transform 0.3s;
    pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Add person modal */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 500;
    align-items: center;
    justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
    background: white;
    border-radius: 12px;
    padding: 1.5rem;
    width: 400px;
    max-width: 90vw;
}
.modal-box h3 { margin-bottom: 1rem; }
.modal-field { margin-bottom: 0.75rem; }
.modal-field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-light); margin-bottom: 0.25rem; }
.modal-field input, .modal-field select {
    width: 100%;
    padding: 0.5rem 0.7rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.85rem;
}
.modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }
.modal-actions button {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
}
.modal-actions .primary { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
.modal-actions .cancel { background: white; }

/* Responsive */
@media (max-width: 768px) {
    .donut-grid { grid-template-columns: 1fr; }
    .person-body { flex-direction: column; align-items: center; }
    .chart-wrapper { width: 160px; height: 160px; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Clever Offers: Team Time Allocation</h1>
    <div class="subtitle">Where the team's hours go each week -- and where they should go</div>
    <div class="meta">Created by Drake Shadwell (drake.shadwell@movewithclever.com) | DRAFT</div>
</div>

<div class="container">
    <!-- Summary KPIs -->
    <div class="summary-bar" id="summaryBar"></div>

    <!-- View Toggle -->
    <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;">
        <div class="view-toggle">
            <button class="view-btn active" onclick="switchView('donut')">Donut Charts</button>
            <button class="view-btn" onclick="switchView('stacked')">Stacked Bar</button>
            <button class="view-btn" onclick="switchView('table')">Data Table</button>
        </div>
        <button class="add-btn" onclick="openModal()" style="margin-left:auto;">+ Add Team Member</button>
    </div>

    <!-- Donut View -->
    <div id="donutView" class="donut-grid"></div>

    <!-- Stacked Bar View -->
    <div id="stackedView" class="stacked-section" style="display:none;">
        <div class="stacked-chart-wrapper">
            <div class="stacked-chart-container">
                <canvas id="stackedChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Table View -->
    <div id="tableView" class="data-table-wrapper" style="display:none;">
        <h3>Detailed Time Allocation</h3>
        <table id="dataTable"></table>
    </div>
</div>

<!-- Add Person Modal -->
<div class="modal-overlay" id="personModal">
    <div class="modal-box">
        <h3>Add Team Member</h3>
        <div class="modal-field">
            <label>Name</label>
            <input type="text" id="newPersonName" placeholder="e.g., Jane Smith">
        </div>
        <div class="modal-field">
            <label>Title / Role</label>
            <input type="text" id="newPersonTitle" placeholder="e.g., Operations Specialist">
        </div>
        <div class="modal-field">
            <label>Weekly Capacity (hours)</label>
            <input type="number" id="newPersonCapacity" value="40" min="1" max="80">
        </div>
        <div class="modal-field">
            <label>Color</label>
            <select id="newPersonColor">
                <option value="#1a73e8">Blue</option>
                <option value="#f4811f">Orange</option>
                <option value="#16a34a">Green</option>
                <option value="#7c3aed">Purple</option>
                <option value="#0d9488">Teal</option>
                <option value="#ec4899">Pink</option>
                <option value="#eab308">Yellow</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="cancel" onclick="closeModal()">Cancel</button>
            <button class="primary" onclick="addPerson()">Add</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== COLOR PALETTE =====
const TASK_COLORS = [
    '#1a73e8','#f4811f','#16a34a','#7c3aed','#0d9488',
    '#ec4899','#eab308','#dc2626','#6366f1','#14b8a6',
    '#f97316','#8b5cf6','#06b6d4','#f43f5e','#84cc16',
    '#a855f7','#22d3ee','#fb923c','#4ade80','#f472b6'
];

// ===== TEAM DATA (pre-loaded from responsibilities dashboard) =====
let teamData = [
    {
        id: 'drake',
        name: 'Drake Shadwell',
        title: 'Clever Offer Manager',
        avatarClass: 'orange',
        avatarColor: '#f4811f',
        capacity: 40,
        tasks: [
            { name: 'Team Leadership', hours: 5, desc: 'Daily standup, weekly 1:1s, coaching' },
            { name: 'Product QA & Specs', hours: 5, desc: 'QA and write specs for Portal, AMP, matching' },
            { name: 'Partner Operations', hours: 6, desc: 'Homeward, QuickBuy, Houzeo, Bankrate, iBuyer' },
            { name: 'Investor Onboarding', hours: 3, desc: 'New investors, inbound, cold outreach' },
            { name: 'Agent Communication', hours: 3, desc: 'Agent emails, program questions' },
            { name: 'Systems & Data', hours: 5, desc: 'HubSpot, Zapier, Salesmsg, pipelines' },
            { name: 'Reporting & Cross-Functional', hours: 6, desc: 'Scorecard, CX Connect, MBR, Town Hall' },
            { name: 'Comms Triage', hours: 4, desc: 'Email and Slack daily processing' },
            { name: 'Meetings', hours: 3, desc: 'Recurring meetings and ad-hoc syncs' }
        ]
    },
    {
        id: 'mike',
        name: 'Mike Provinzino',
        title: 'Investor Network Manager',
        avatarClass: 'green',
        avatarColor: '#16a34a',
        capacity: 40,
        tasks: [
            { name: 'Network Recruitment', hours: 10, desc: 'Own recruitment strategy, cold calls, documentation' },
            { name: 'Network Management', hours: 8, desc: 'Monitor lead flow, investor relationships' },
            { name: 'Investor Standards & CX', hours: 5, desc: 'Set/enforce standards, follow up on poor experiences' },
            { name: 'Matching Team Oversight', hours: 6, desc: 'Oversee matching quality/volume/speed, coverage gaps' },
            { name: 'Problem Identification', hours: 4, desc: 'Catch problems before escalation, spot patterns' },
            { name: 'Investor Portal QA', hours: 3, desc: 'QA portal updates, onboarding flow testing' },
            { name: 'Meetings', hours: 4, desc: 'Standups, syncs, ad-hoc calls' }
        ]
    },
    {
        id: 'collins',
        name: 'Collins Okoye',
        title: 'Agent Education Specialist',
        avatarClass: 'purple',
        avatarColor: '#7c3aed',
        capacity: 40,
        tasks: [
            { name: 'Agent Education', hours: 12, desc: 'Educate agents on all Offers programs' },
            { name: 'Agent Compliance', hours: 6, desc: 'Monitor and enforce agent compliance' },
            { name: 'Customer Reactivation', hours: 8, desc: 'Re-engage stalled customers, outreach' },
            { name: 'Cross-Functional Support', hours: 5, desc: 'Support CX, cover calls, ad-hoc requests' },
            { name: 'QuickBuy Agent Comms', hours: 4, desc: 'QuickBuy-specific agent outreach and support' },
            { name: 'Meetings', hours: 3, desc: 'Standups and team syncs' }
        ]
    },
    {
        id: 'jay-marvin',
        name: 'Jay Watson & Marvin',
        title: 'Matching Specialists',
        avatarClass: 'teal',
        avatarColor: '#0d9488',
        capacity: 80,
        tasks: [
            { name: 'AMP Queue Processing', hours: 35, desc: 'Process AMP queue daily (60-80 leads/day combined)' },
            { name: '7-Day Coverage', hours: 15, desc: 'Weekend and holiday matching coverage' },
            { name: 'Deal Auditing', hours: 10, desc: 'Audit flagged deals for quality and coverage' },
            { name: 'Escalations to Mike P', hours: 4, desc: 'Escalate matching issues and edge cases' },
            { name: 'Meetings', hours: 4, desc: 'Standups and check-ins' }
        ]
    }
];

// ===== STATE =====
let currentView = 'donut';
let charts = {};
let stackedChart = null;

// ===== INIT =====
function init() {
    loadSavedData();
    renderAll();
}

function renderAll() {
    renderSummary();
    renderDonuts();
    renderStacked();
    renderTable();
}

// ===== PERSISTENCE =====
function saveData() {
    const saveObj = teamData.map(p => ({
        id: p.id,
        name: p.name,
        title: p.title,
        avatarClass: p.avatarClass,
        avatarColor: p.avatarColor,
        capacity: p.capacity,
        tasks: p.tasks
    }));
    try {
        localStorage.setItem('offers-time-alloc', JSON.stringify(saveObj));
    } catch(e) {}
    showToast('Changes saved');
}

function loadSavedData() {
    try {
        const saved = localStorage.getItem('offers-time-alloc');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed) && parsed.length > 0) {
                teamData = parsed;
            }
        }
    } catch(e) {}
}

// ===== SUMMARY BAR =====
function renderSummary() {
    const bar = document.getElementById('summaryBar');
    const totalCapacity = teamData.reduce((s, p) => s + p.capacity, 0);
    const totalAllocated = teamData.reduce((s, p) => s + p.tasks.reduce((ts, t) => ts + t.hours, 0), 0);
    const totalUnallocated = totalCapacity - totalAllocated;
    const utilization = totalCapacity > 0 ? Math.round((totalAllocated / totalCapacity) * 100) : 0;

    // Collect all unique task categories
    const taskMap = {};
    teamData.forEach(p => p.tasks.forEach(t => {
        if (!taskMap[t.name]) taskMap[t.name] = 0;
        taskMap[t.name] += t.hours;
    }));
    const topTask = Object.entries(taskMap).sort((a,b) => b[1] - a[1])[0];

    bar.innerHTML = `
        <div class="summary-card">
            <div class="label">Team Members</div>
            <div class="value">${teamData.length}</div>
            <div class="sub">${totalCapacity} hrs/wk total capacity</div>
        </div>
        <div class="summary-card">
            <div class="label">Hours Allocated</div>
            <div class="value">${totalAllocated}</div>
            <div class="sub">${totalUnallocated >= 0 ? totalUnallocated + ' hrs unallocated' : Math.abs(totalUnallocated) + ' hrs over capacity'}</div>
        </div>
        <div class="summary-card">
            <div class="label">Utilization</div>
            <div class="value" style="color:${utilization > 100 ? 'var(--red)' : utilization > 90 ? 'var(--yellow)' : 'var(--green)'}">${utilization}%</div>
            <div class="sub">${utilization > 100 ? 'Over capacity!' : utilization > 90 ? 'Near capacity' : 'Healthy range'}</div>
        </div>
        <div class="summary-card">
            <div class="label">Top Time Sink</div>
            <div class="value" style="font-size:1rem;">${topTask ? topTask[0] : '--'}</div>
            <div class="sub">${topTask ? topTask[1] + ' hrs/wk across team' : ''}</div>
        </div>
    `;
}

// ===== DONUT VIEW =====
function renderDonuts() {
    const grid = document.getElementById('donutView');
    grid.innerHTML = '';

    // Destroy old charts
    Object.values(charts).forEach(c => c.destroy());
    charts = {};

    teamData.forEach((person, pIdx) => {
        const totalHours = person.tasks.reduce((s, t) => s + t.hours, 0);
        const utilPct = person.capacity > 0 ? Math.round((totalHours / person.capacity) * 100) : 0;
        const unalloc = person.capacity - totalHours;

        const card = document.createElement('div');
        card.className = 'person-card';
        card.id = `card-${person.id}`;

        // Task rows
        let taskRows = person.tasks.map((t, tIdx) => {
            const pct = totalHours > 0 ? Math.round((t.hours / totalHours) * 100) : 0;
            return `<div class="task-row" title="${t.desc || ''}">
                <span class="task-color" style="background:${TASK_COLORS[tIdx % TASK_COLORS.length]}"></span>
                <span class="task-name">${t.name}</span>
                <span class="task-hours">${t.hours}h</span>
                <span class="task-pct">${pct}%</span>
                <button class="remove-btn" onclick="removeTask(${pIdx}, ${tIdx})" title="Remove">&times;</button>
            </div>`;
        }).join('');

        if (unalloc > 0) {
            const pct = Math.round((unalloc / person.capacity) * 100);
            taskRows += `<div class="task-row" style="opacity:0.5;">
                <span class="task-color" style="background:#e2e8f0"></span>
                <span class="task-name" style="font-style:italic;">Unallocated</span>
                <span class="task-hours">${unalloc}h</span>
                <span class="task-pct">${pct}%</span>
            </div>`;
        }

        card.innerHTML = `
            <div class="person-header">
                <div class="avatar ${person.avatarClass}" style="${!person.avatarClass ? 'background:' + person.avatarColor : ''}">${person.name.split(' ').map(n => n[0]).join('').slice(0, 2)}</div>
                <div class="person-info">
                    <h3>${person.name}</h3>
                    <div class="title">${person.title}</div>
                </div>
                <div class="person-hours">
                    <div class="total" style="color:${utilPct > 100 ? 'var(--red)' : 'var(--primary-blue)'}">${totalHours}h</div>
                    <div class="label">${utilPct}% of ${person.capacity}h</div>
                </div>
            </div>
            <div class="person-body">
                <div class="chart-wrapper">
                    <canvas id="donut-${person.id}"></canvas>
                </div>
                <div class="task-list">${taskRows}</div>
            </div>
            <div class="person-footer">
                <div class="add-task-row">
                    <input type="text" placeholder="Task name..." id="newTask-${person.id}">
                    <input type="number" placeholder="Hrs" min="0.5" step="0.5" id="newHours-${person.id}" style="width:55px;">
                    <button class="add-btn" onclick="addTask(${pIdx})">+</button>
                </div>
            </div>
        `;

        grid.appendChild(card);

        // Render donut chart
        const ctx = document.getElementById(`donut-${person.id}`).getContext('2d');
        const labels = person.tasks.map(t => t.name);
        const data = person.tasks.map(t => t.hours);
        const colors = person.tasks.map((_, i) => TASK_COLORS[i % TASK_COLORS.length]);

        if (unalloc > 0) {
            labels.push('Unallocated');
            data.push(unalloc);
            colors.push('#e2e8f0');
        }

        charts[person.id] = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: colors,
                    borderWidth: 2,
                    borderColor: '#fff',
                    hoverOffset: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                cutout: '55%',
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                const pct = Math.round((ctx.raw / total) * 100);
                                return `${ctx.label}: ${ctx.raw}h (${pct}%)`;
                            }
                        }
                    }
                }
            },
            plugins: [{
                id: 'centerText',
                beforeDraw(chart) {
                    const {ctx, width, height} = chart;
                    ctx.save();
                    ctx.font = 'bold 18px -apple-system, sans-serif';
                    ctx.fillStyle = '#1e293b';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(`${totalHours}h`, width / 2, height / 2 - 6);
                    ctx.font = '11px -apple-system, sans-serif';
                    ctx.fillStyle = '#64748b';
                    ctx.fillText(`/ ${person.capacity}h`, width / 2, height / 2 + 12);
                    ctx.restore();
                }
            }]
        });
    });
}

// ===== STACKED BAR VIEW =====
function renderStacked() {
    if (stackedChart) stackedChart.destroy();

    // Collect all unique task names across all people
    const allTaskNames = [];
    teamData.forEach(p => p.tasks.forEach(t => {
        if (!allTaskNames.includes(t.name)) allTaskNames.push(t.name);
    }));

    const datasets = allTaskNames.map((taskName, i) => ({
        label: taskName,
        data: teamData.map(p => {
            const t = p.tasks.find(x => x.name === taskName);
            return t ? t.hours : 0;
        }),
        backgroundColor: TASK_COLORS[i % TASK_COLORS.length],
        borderRadius: 3,
        borderSkipped: false
    }));

    // Add unallocated
    const unallocData = teamData.map(p => {
        const used = p.tasks.reduce((s, t) => s + t.hours, 0);
        return Math.max(0, p.capacity - used);
    });
    if (unallocData.some(v => v > 0)) {
        datasets.push({
            label: 'Unallocated',
            data: unallocData,
            backgroundColor: '#e2e8f0',
            borderRadius: 3,
            borderSkipped: false
        });
    }

    const ctx = document.getElementById('stackedChart').getContext('2d');
    stackedChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: teamData.map(p => p.name),
            datasets: datasets
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            indexAxis: 'y',
            scales: {
                x: {
                    stacked: true,
                    title: { display: true, text: 'Hours per Week' },
                    grid: { color: '#f1f5f9' }
                },
                y: {
                    stacked: true,
                    grid: { display: false }
                }
            },
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { boxWidth: 12, padding: 12, font: { size: 11 } }
                },
                tooltip: {
                    callbacks: {
                        label: ctx => `${ctx.dataset.label}: ${ctx.raw}h`
                    }
                }
            }
        }
    });
}

// ===== TABLE VIEW =====
function renderTable() {
    const table = document.getElementById('dataTable');

    // Collect all unique tasks
    const allTasks = [];
    teamData.forEach(p => p.tasks.forEach(t => {
        if (!allTasks.includes(t.name)) allTasks.push(t.name);
    }));

    let header = '<thead><tr><th>Task / Responsibility</th>';
    teamData.forEach(p => { header += `<th style="text-align:center;">${p.name.split(' ')[0]}</th>`; });
    header += '<th style="text-align:center;">Total</th></tr></thead>';

    let body = '<tbody>';
    allTasks.forEach(taskName => {
        let row = `<tr><td>${taskName}</td>`;
        let rowTotal = 0;
        teamData.forEach((p, pIdx) => {
            const t = p.tasks.find(x => x.name === taskName);
            const hrs = t ? t.hours : 0;
            rowTotal += hrs;
            const tIdx = t ? p.tasks.indexOf(t) : -1;
            if (hrs > 0) {
                row += `<td style="text-align:center;"><input class="editable-hours" type="number" value="${hrs}" min="0" step="0.5" onchange="updateHours(${pIdx}, ${tIdx}, this.value)"></td>`;
            } else {
                row += `<td style="text-align:center;color:#cbd5e1;">--</td>`;
            }
        });
        row += `<td style="text-align:center;font-weight:600;">${rowTotal}h</td></tr>`;
        body += row;
    });

    // Totals row
    body += '<tr style="background:var(--bg);font-weight:700;"><td>TOTAL ALLOCATED</td>';
    let grandTotal = 0;
    teamData.forEach(p => {
        const total = p.tasks.reduce((s, t) => s + t.hours, 0);
        grandTotal += total;
        body += `<td style="text-align:center;">${total}h</td>`;
    });
    body += `<td style="text-align:center;">${grandTotal}h</td></tr>`;

    // Capacity row
    body += '<tr style="font-weight:600;color:var(--text-light);"><td>CAPACITY</td>';
    let grandCap = 0;
    teamData.forEach(p => {
        grandCap += p.capacity;
        body += `<td style="text-align:center;">${p.capacity}h</td>`;
    });
    body += `<td style="text-align:center;">${grandCap}h</td></tr>`;

    // Utilization row
    body += '<tr style="font-weight:600;"><td>UTILIZATION</td>';
    teamData.forEach(p => {
        const total = p.tasks.reduce((s, t) => s + t.hours, 0);
        const util = p.capacity > 0 ? Math.round((total / p.capacity) * 100) : 0;
        const color = util > 100 ? 'var(--red)' : util > 90 ? 'var(--yellow)' : 'var(--green)';
        body += `<td style="text-align:center;">
            <span class="capacity-bar"><span class="capacity-fill" style="width:${Math.min(util, 100)}%;background:${color};"></span></span>
            <span style="color:${color};">${util}%</span>
        </td>`;
    });
    const grandUtil = grandCap > 0 ? Math.round((grandTotal / grandCap) * 100) : 0;
    body += `<td style="text-align:center;font-weight:700;">${grandUtil}%</td></tr>`;

    body += '</tbody>';
    table.innerHTML = header + body;
}

// ===== ACTIONS =====
function addTask(personIdx) {
    const person = teamData[personIdx];
    const nameInput = document.getElementById(`newTask-${person.id}`);
    const hoursInput = document.getElementById(`newHours-${person.id}`);
    const name = nameInput.value.trim();
    const hours = parseFloat(hoursInput.value);

    if (!name) { nameInput.focus(); return; }
    if (!hours || hours <= 0) { hoursInput.focus(); return; }

    person.tasks.push({ name: name, hours: hours, desc: '' });
    nameInput.value = '';
    hoursInput.value = '';
    saveData();
    renderAll();
}

function removeTask(personIdx, taskIdx) {
    teamData[personIdx].tasks.splice(taskIdx, 1);
    saveData();
    renderAll();
}

function updateHours(personIdx, taskIdx, value) {
    const hrs = parseFloat(value);
    if (isNaN(hrs) || hrs < 0) return;
    if (taskIdx >= 0) {
        teamData[personIdx].tasks[taskIdx].hours = hrs;
        saveData();
        renderAll();
    }
}

function switchView(view) {
    currentView = view;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');

    document.getElementById('donutView').style.display = view === 'donut' ? '' : 'none';
    document.getElementById('stackedView').style.display = view === 'stacked' ? '' : 'none';
    document.getElementById('tableView').style.display = view === 'table' ? '' : 'none';

    if (view === 'stacked') renderStacked();
    if (view === 'table') renderTable();
}

// ===== ADD PERSON =====
function openModal() { document.getElementById('personModal').classList.add('active'); }
function closeModal() { document.getElementById('personModal').classList.remove('active'); }

function addPerson() {
    const name = document.getElementById('newPersonName').value.trim();
    const title = document.getElementById('newPersonTitle').value.trim();
    const capacity = parseInt(document.getElementById('newPersonCapacity').value) || 40;
    const color = document.getElementById('newPersonColor').value;

    if (!name) return;

    const id = name.toLowerCase().replace(/\s+/g, '-');
    teamData.push({
        id: id,
        name: name,
        title: title || 'Team Member',
        avatarClass: '',
        avatarColor: color,
        capacity: capacity,
        tasks: []
    });

    closeModal();
    document.getElementById('newPersonName').value = '';
    document.getElementById('newPersonTitle').value = '';
    saveData();
    renderAll();
}

// ===== TOAST =====
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== GO =====
init();
</script>
